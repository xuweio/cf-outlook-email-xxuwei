<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="Outlook 邮件管理">Outlook 邮件管理</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2'><path d='M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z'/><polyline points='22,6 12,13 2,6'/></svg>">
  <link rel="stylesheet" href="/assets/style.css">
  <script>
    // Apply theme before render to prevent flash
    (function(){
      var t = localStorage.getItem('theme') || 'auto';
      if (t === 'auto') t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <!-- Auth gate: shown while checking login status -->
  <div id="authGate" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999">
    <div style="text-align:center">
      <div class="spinner" style="margin:0 auto 12px"></div>
      <div style="color:var(--text-dim);font-size:13px" data-i18n="正在验证登录状态...">正在验证登录状态...</div>
    </div>
  </div>
  <div class="app" style="display:none" id="mainApp">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <h1 class="sidebar-title" data-i18n="邮件管理">邮件管理</h1>
        <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开菜单" data-i18n-title="收起/展开菜单">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
      <nav class="nav">
        <button class="nav-item" data-page="dashboard" onclick="navigate('dashboard')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span data-i18n="仪表盘">仪表盘</span>
        </button>
        <button class="nav-item" data-page="accounts" onclick="navigate('accounts')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span data-i18n="邮箱账号">邮箱账号</span>
        </button>
        <button class="nav-item" data-page="groups" onclick="navigate('groups')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          <span data-i18n="分组管理">分组管理</span>
        </button>
        <button class="nav-item" data-page="tags" onclick="navigate('tags')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <span data-i18n="标签管理">标签管理</span>
        </button>
        <button class="nav-item" data-page="emails" onclick="navigate('emails')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span data-i18n="邮件查看">邮件查看</span>
        </button>
        <button class="nav-item" data-page="temp-emails" onclick="navigate('temp-emails')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span data-i18n="临时邮箱">临时邮箱</span>
        </button>
        <button class="nav-item" data-page="settings" onclick="navigate('settings')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span data-i18n="系统设置">系统设置</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <a class="repo-link" href="https://github.com/roseforyou/cf-outlook-email" target="_blank" rel="noopener" title="GitHub 开源地址" data-i18n-title="GitHub 开源地址">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.2.8-.5v-1.7c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 016 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.5 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
          <span data-i18n="GitHub 开源">GitHub 开源</span>
        </a>
        <button class="logout-btn" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span data-i18n="退出登录">退出登录</span>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-title" id="topbarTitle" data-i18n="仪表盘">仪表盘</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="theme-toggle" id="langToggle" title="切换语言" data-i18n-title="切换语言">
            <button class="theme-btn lang-btn" data-lang="zh" onclick="setLang('zh')">中</button>
            <button class="theme-btn lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
          </div>
          <div class="theme-toggle" id="themeToggle">
            <button class="theme-btn" data-theme="light" onclick="setTheme('light', event)" title="浅色" data-i18n-title="浅色">☀️</button>
            <button class="theme-btn" data-theme="dark" onclick="setTheme('dark', event)" title="深色" data-i18n-title="深色">🌙</button>
            <button class="theme-btn" data-theme="auto" onclick="setTheme('auto', event)" title="跟随系统" data-i18n-title="跟随系统">💻</button>
          </div>
        </div>
      </header>
      <div class="content" id="pageContent">
        <div class="loading"><div class="spinner"></div><span data-i18n="加载中...">加载中...</span></div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/assets/i18n.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
